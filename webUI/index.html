<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dart Launcher 控制面板</title>
    <!-- 本地依赖，支持无网环境 -->
    <script src="lib/eventemitter2.min.js"></script>
    <script src="lib/roslib.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card {
            background: white;
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            text-align: center;
            margin-top: 0;
            color: #2c3e50;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .status-value {
            padding: 4px 8px;
            border-radius: 4px;
        }

        .status-ok {
            background-color: #d4edda;
            color: #27ae60;
        }

        .status-err {
            background-color: #f8d7da;
            color: #c0392b;
        }

        .status-idle {
            background-color: #e2e3e5;
            color: #383d41;
        }

        .status-running {
            background-color: #cce5ff;
            color: #004085;
        }

        .status-handshake {
            background-color: #fff3cd;
            color: #856404;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        button {
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #bdc3c7 !important;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .btn-primary {
            background-color: #3498db;
        }

        .btn-primary:hover:not(:disabled) {
            background-color: #2980b9;
        }

        .btn-danger {
            background-color: #e74c3c;
        }

        .btn-danger:hover:not(:disabled) {
            background-color: #c0392b;
        }

        .btn-warning {
            background-color: #f1c40f;
            color: #333;
        }

        .btn-warning:hover:not(:disabled) {
            background-color: #f39c12;
        }

        .btn-success {
            background-color: #2ecc71;
        }

        .btn-success:hover:not(:disabled) {
            background-color: #27ae60;
        }

        #ws-url {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>Dart Launcher 控制面板</h1>

        <div>
            <label for="ws-url" style="font-size: 12px; color: #7f8c8d;">Rosbridge WebSocket 地址:</label>
            <input type="text" id="ws-url" value="ws://localhost:9090" />
            <button onclick="connect()" class="btn-primary"
                style="width: 100%; padding: 8px; margin-bottom: 15px;">连接</button>
        </div>

        <div class="status-row">
            <span>连接状态:</span>
            <span id="conn-status" class="status-value status-err">未连接</span>
        </div>
        <div class="status-row">
            <span>设备状态:</span>
            <span id="device-status" class="status-value status-idle">未知</span>
        </div>
    </div>

    <div class="card">
        <div class="btn-group">
            <button class="btn-primary ctrl-btn" onclick="sendCommand('launch_prepare')" disabled>上膛</button>
            <button class="btn-success ctrl-btn" onclick="sendCommand('fire')" disabled>发射</button>
            <button class="btn-warning ctrl-btn" onclick="sendCommand('unload')" disabled>退膛</button>
            <hr style="width: 100%; border: 0; border-top: 1px solid #eee; margin: 10px 0;">
            <button class="btn-success ctrl-btn" onclick="sendCommand('recover')" disabled>恢复状态 (Recover)</button>
            <button class="btn-danger ctrl-btn" onclick="sendCommand('cancel')" disabled>紧急停止 (Cancel All)</button>
        </div>
    </div>

    <script>
        let ros = null;
        let cmdTopic = null;
        let heartbeatTopic = null;
        let heartbeatTimer = null;
        let isConnected = false;

        // 默认自动获取当前网页 IP 作为 ws 地址
        window.onload = () => {
            const defaultHost = window.location.hostname || 'localhost';
            document.getElementById('ws-url').value = `ws://${defaultHost}:9090`;
        };

        function updateControlButtons(enabled) {
            const buttons = document.querySelectorAll('.ctrl-btn');
            buttons.forEach(btn => {
                btn.disabled = !enabled;
            });
        }

        function startHeartbeat() {
            if (heartbeatTimer) clearInterval(heartbeatTimer);

            heartbeatTopic = new ROSLIB.Topic({
                ros: ros,
                name: '/dart/manager/web_heartbeat',
                messageType: 'std_msgs/msg/Empty'
            });

            const emptyMsg = new ROSLIB.Message({});

            // 立即发一次，然后 500ms 一次
            heartbeatTopic.publish(emptyMsg);
            heartbeatTimer = setInterval(() => {
                if (isConnected) {
                    heartbeatTopic.publish(emptyMsg);
                }
            }, 500);
        }

        function stopHeartbeat() {
            if (heartbeatTimer) {
                clearInterval(heartbeatTimer);
                heartbeatTimer = null;
            }
        }

        function connect() {
            if (ros) { ros.close(); }

            const wsUrl = document.getElementById('ws-url').value;
            ros = new ROSLIB.Ros({ url: wsUrl });

            ros.on('connection', () => {
                isConnected = true;
                const el = document.getElementById('conn-status');
                el.textContent = '连接中...';
                el.className = 'status-value status-handshake';

                // 初始化 Topic
                cmdTopic = new ROSLIB.Topic({
                    ros: ros,
                    name: '/dart/manager/command',
                    messageType: 'std_msgs/msg/String'
                });

                // 启动心跳
                startHeartbeat();

                // 视觉上延迟一下提示已接管，体验更好
                setTimeout(() => {
                    if (isConnected) {
                        el.textContent = '已连接 & 接管';
                        el.className = 'status-value status-ok';
                        updateControlButtons(true);
                    }
                }, 600);

                // 订阅状态
                const stateTopic = new ROSLIB.Topic({
                    ros: ros,
                    name: '/dart/manager/state',
                    messageType: 'std_msgs/msg/UInt8'
                });

                stateTopic.subscribe((message) => {
                    const stateEl = document.getElementById('device-status');
                    // State: 0=IDLE, 1=RUNNING, 2=ERROR
                    switch (message.data) {
                        case 0:
                            stateEl.textContent = 'IDLE (空闲)';
                            stateEl.className = 'status-value status-idle';
                            break;
                        case 1:
                            stateEl.textContent = 'RUNNING (运行中)';
                            stateEl.className = 'status-value status-running';
                            break;
                        case 2:
                            stateEl.textContent = 'ERROR (异常)';
                            stateEl.className = 'status-value status-err';
                            break;
                        default:
                            stateEl.textContent = 'UNKNOWN';
                            stateEl.className = 'status-value status-idle';
                    }
                });
            });

            ros.on('error', (error) => {
                isConnected = false;
                stopHeartbeat();
                updateControlButtons(false);
                const el = document.getElementById('conn-status');
                el.textContent = '连接失败';
                el.className = 'status-value status-err';
                console.error('Error connecting to websocket server: ', error);
            });

            ros.on('close', () => {
                isConnected = false;
                stopHeartbeat();
                updateControlButtons(false);
                const el = document.getElementById('conn-status');
                el.textContent = '已断开';
                el.className = 'status-value status-err';

                const stateEl = document.getElementById('device-status');
                stateEl.textContent = '未知';
                stateEl.className = 'status-value status-idle';
            });
        }

        function sendCommand(cmdStr) {
            if (!cmdTopic || !isConnected) {
                alert("请先连接服务器！");
                return;
            }
            const msg = new ROSLIB.Message({ data: cmdStr });
            cmdTopic.publish(msg);
            console.log("Sent command: " + cmdStr);
        }
    </script>

</body>

</html>
